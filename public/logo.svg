<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 108" fill="none">
  <!-- Laptop illustration -->
  <g stroke="#2a9d8f" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Screen outer frame -->
    <rect x="12" y="4" width="136" height="80" rx="5" stroke-width="2.3"/>

    <!-- Screen display -->
    <rect x="23" y="17" width="114" height="56" rx="2" stroke-width="1.9"/>

    <!-- Top bar: 3 circles -->
    <circle cx="33" cy="12" r="3.5" stroke-width="1.8"/>
    <circle cx="44" cy="12" r="3.5" stroke-width="1.8"/>
    <circle cx="55" cy="12" r="3.5" stroke-width="1.8"/>

    <!-- Top bar: small rectangle -->
    <rect x="98" y="8.5" width="26" height="7" rx="2" stroke-width="1.6"/>

    <!-- Screen diagonal sketch lines -->
    <line x1="29" y1="27" x2="55" y2="70" stroke-width="1.5"/>
    <line x1="49" y1="21" x2="76" y2="70" stroke-width="1.5"/>

    <!-- Keyboard base -->
    <rect x="2" y="87" width="156" height="19" rx="3" stroke-width="2.2"/>

    <!-- Keys row 1 -->
    <rect x="8"   y="90" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="20"  y="90" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="32"  y="90" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="44"  y="90" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="56"  y="90" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="68"  y="90" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="80"  y="90" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="92"  y="90" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="104" y="90" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="116" y="90" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="128" y="90" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="140" y="90" width="12" height="5" rx="1" stroke-width="1.3"/>

    <!-- Keys row 2 (left cluster) -->
    <rect x="8"  y="98" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="20" y="98" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="32" y="98" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="44" y="98" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="56" y="98" width="9" height="5" rx="1" stroke-width="1.3"/>
    <rect x="68" y="98" width="9" height="5" rx="1" stroke-width="1.3"/>

    <!-- Trackpad -->
    <rect x="88" y="97" width="64" height="7" rx="2" stroke-width="1.5"/>

  </g>

  <!-- Anduwu wordmark -->
  <text x="170" y="83"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76"
        fill="#2a9d8f"
        font-weight="400">Anduwu</text>
</svg>
